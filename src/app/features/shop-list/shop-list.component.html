<section class="product-list">
  <h2 class="text-4xl font-bold tracking-tight mb-6">{{ 'products' | translate }}</h2>

  @if (offersResource.isLoading()) {
    <div class="flex justify-center py-12">
      <mat-spinner diameter="40" />
    </div>
  } @else if (offersResource.error()) {
    <p class="text-center text-red-700 py-6">Nepodařilo se načíst nabídky.</p>
  } @else {
    @for (offer of offersResource.value(); track offer.id) {
      <mat-card>
        <mat-card-content class="product-card__content">
          <img
            class="product-card__image"
            [src]="offer.images.lists.medium[0]?.url ?? ''"
            [alt]="offer.name"
          />
          <div class="product-card__info">
            <span class="product-card__name">{{ offer.name }}</span>
            <span class="product-card__price">{{ offer.buyNowPrice.amount | price }}</span>
          </div>
          <div class="product-card__actions">
            <div class="product-card__quantity">
              <button mat-icon-button (click)="decrement(offer.id)">
                <mat-icon>remove</mat-icon>
              </button>
              <input
                class="product-card__quantity-input"
                type="number"
                min="1"
                [value]="getQuantity(offer.id)"
                (change)="setQuantity(offer.id, $any($event.target).value)"
              />
              <button mat-icon-button (click)="increment(offer.id)">
                <mat-icon>add</mat-icon>
              </button>
            </div>
            <button
              mat-flat-button
              color="primary"
              class="add-btn"
              [class.add-btn--added]="addedIds().has(offer.id)"
              (click)="addToBasket(offer)"
            >
              @if (addedIds().has(offer.id)) {
                <mat-icon class="add-btn__icon">check</mat-icon>
              } @else {
                {{ 'addToBasket' | translate }}
              }
            </button>
          </div>
        </mat-card-content>
      </mat-card>
    }
  }
</section>
