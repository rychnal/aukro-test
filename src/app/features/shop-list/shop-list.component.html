<section class="auction-list">
  <h2>{{ 'currentAuctions' | translate }}</h2>
  @for (auction of auctions; track auction.id) {
    <mat-card class="auction-card">
      <mat-card-title>{{ auction.title }}</mat-card-title>
      <mat-card-content>
        <p>{{ 'endsAt' | translate }}: {{ auction.endsAt }}</p>
      </mat-card-content>
    </mat-card>
  }
</section>
